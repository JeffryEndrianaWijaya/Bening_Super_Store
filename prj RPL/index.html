<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BeningKomputer</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --cream: #faf7f2;
                --warm-white: #fffdf9;
                --charcoal: #1c1c1c;
                --brown: #3d2b1f;
                --accent: #c8733a;
                --accent-light: #f5e6d8;
                --accent-dark: #9e5625;
                --muted: #888070;
                --border: #e8e2d8;
                --success: #2e7d5e;
                --success-bg: #eaf5ef;
                --shadow-sm: 0 2px 8px rgba(28, 28, 28, 0.06);
                --shadow-md: 0 6px 24px rgba(28, 28, 28, 0.1);
            }

            body {
                font-family: "DM Sans", sans-serif;
                background: var(--cream);
                color: var(--charcoal);
                min-height: 100vh;
            }

            /* NAV */
            nav {
                background: var(--warm-white);
                border-bottom: 1px solid var(--border);
                position: sticky;
                top: 0;
                z-index: 100;
                padding: 0 2rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
                height: 64px;
            }
            .nav-logo {
                font-family: "Playfair Display", serif;
                font-size: 1.4rem;
                color: var(--brown);
                letter-spacing: -0.5px;
            }
            .nav-logo span {
                color: var(--accent);
            }
            .nav-links {
                display: flex;
                gap: 2rem;
                list-style: none;
            }
            .nav-links a {
                text-decoration: none;
                font-size: 0.88rem;
                font-weight: 400;
                color: var(--muted);
                transition: color 0.2s;
            }
            .nav-links a:hover,
            .nav-links a.active {
                color: var(--charcoal);
            }
            .nav-actions {
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            .cart-btn {
                background: var(--charcoal);
                color: #fff;
                border: none;
                border-radius: 999px;
                padding: 0.5rem 1.2rem;
                font-size: 0.85rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
                font-family: inherit;
                transition: background 0.2s;
            }
            .cart-btn:hover {
                background: var(--brown);
            }
            .cart-count {
                background: var(--accent);
                color: #fff;
                border-radius: 50%;
                width: 18px;
                height: 18px;
                font-size: 0.7rem;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .login-btn {
                background: transparent;
                color: var(--charcoal);
                border: 1px solid var(--border);
                border-radius: 999px;
                padding: 0.5rem 1.2rem;
                font-size: 0.85rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
                font-family: inherit;
                transition: all 0.2s;
            }
            .login-btn:hover {
                background: var(--charcoal);
                color: #fff;
                border-color: var(--charcoal);
            }

            /* HERO */
            .hero {
                background: var(--warm-white);
                padding: 5rem 2rem 4rem;
                text-align: center;
                border-bottom: 1px solid var(--border);
            }
            .hero-tag {
                display: inline-block;
                background: var(--accent-light);
                color: var(--accent-dark);
                font-size: 0.75rem;
                font-weight: 500;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                padding: 4px 14px;
                border-radius: 999px;
                margin-bottom: 1.2rem;
            }
            .hero h1 {
                font-family: "Playfair Display", serif;
                font-size: clamp(2rem, 5vw, 3.4rem);
                color: var(--brown);
                line-height: 1.15;
                max-width: 600px;
                margin: 0 auto 1rem;
            }
            .hero p {
                color: var(--muted);
                max-width: 460px;
                margin: 0 auto 2rem;
                line-height: 1.7;
            }
            .hero-cta {
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 999px;
                padding: 0.75rem 2rem;
                font-size: 0.9rem;
                font-weight: 500;
                cursor: pointer;
                font-family: inherit;
                transition: background 0.2s;
            }
            .hero-cta:hover {
                background: var(--accent-dark);
            }

            /* FILTER */
            .filter-bar {
                padding: 1.5rem 2rem;
                display: flex;
                align-items: center;
                gap: 0.75rem;
                flex-wrap: wrap;
                border-bottom: 1px solid var(--border);
                background: var(--warm-white);
            }
            .filter-label {
                font-size: 0.8rem;
                color: var(--muted);
                margin-right: 0.25rem;
            }
            .filter-btn {
                background: transparent;
                border: 1px solid var(--border);
                border-radius: 999px;
                padding: 0.35rem 1rem;
                font-size: 0.82rem;
                cursor: pointer;
                font-family: inherit;
                color: var(--charcoal);
                transition: all 0.2s;
            }
            .filter-btn:hover,
            .filter-btn.active {
                background: var(--charcoal);
                color: #fff;
                border-color: var(--charcoal);
            }
            .search-bar {
                margin-left: auto;
                display: flex;
                align-items: center;
                border: 1px solid var(--border);
                border-radius: 999px;
                background: var(--cream);
                overflow: hidden;
                padding: 0 1rem;
                gap: 6px;
            }
            .search-bar input {
                border: none;
                background: transparent;
                outline: none;
                font-size: 0.82rem;
                font-family: inherit;
                padding: 0.35rem 0;
                width: 160px;
                color: var(--charcoal);
            }
            .search-bar svg {
                width: 15px;
                color: var(--muted);
            }

            /* PRODUCTS GRID */
            .section {
                padding: 2rem;
            }
            .section-header {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 1.5rem;
            }
            .section-title {
                font-family: "Playfair Display", serif;
                font-size: 1.5rem;
                color: var(--brown);
            }
            .section-count {
                font-size: 0.8rem;
                color: var(--muted);
            }

            .products-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
                gap: 1.5rem;
            }

            .product-card {
                background: var(--warm-white);
                border-radius: 16px;
                overflow: hidden;
                border: 1px solid var(--border);
                transition:
                    box-shadow 0.25s,
                    transform 0.25s;
                cursor: pointer;
            }
            .product-card:hover {
                box-shadow: var(--shadow-md);
                transform: translateY(-3px);
            }

            .product-img {
                width: 100%;
                aspect-ratio: 4/3;
                object-fit: cover;
                background: var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 3rem;
                position: relative;
            }
            .product-badge {
                position: absolute;
                top: 10px;
                left: 10px;
                background: var(--accent);
                color: #fff;
                font-size: 0.7rem;
                font-weight: 500;
                padding: 3px 9px;
                border-radius: 999px;
            }
            .product-badge.sale {
                background: #c0392b;
            }
            .product-badge.new {
                background: var(--success);
            }

            .product-info {
                padding: 1rem 1.1rem 1.1rem;
            }
            .product-cat {
                font-size: 0.72rem;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 4px;
            }
            .product-name {
                font-weight: 500;
                font-size: 0.95rem;
                margin-bottom: 6px;
                color: var(--charcoal);
            }
            .product-rating {
                display: flex;
                align-items: center;
                gap: 4px;
                margin-bottom: 10px;
            }
            .stars {
                color: #e8b84b;
                font-size: 0.75rem;
            }
            .rating-text {
                font-size: 0.72rem;
                color: var(--muted);
            }
            .product-footer {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .product-price {
                font-weight: 500;
                font-size: 1rem;
                color: var(--brown);
            }
            .product-price-old {
                font-size: 0.78rem;
                color: var(--muted);
                text-decoration: line-through;
                margin-left: 4px;
            }
            .add-btn {
                background: var(--charcoal);
                color: #fff;
                border: none;
                border-radius: 8px;
                width: 32px;
                height: 32px;
                font-size: 1.2rem;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: background 0.2s;
            }
            .add-btn:hover {
                background: var(--accent);
            }

            /* TOAST */

            .toast {
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                background: var(--charcoal);
                color: #fff;
                padding: 0.75rem 1.25rem;
                border-radius: 10px;
                font-size: 0.85rem;
                box-shadow: var(--shadow-md);
                opacity: 0;
                transform: translateY(10px);
                transition: all 0.3s;
                pointer-events: none;
                z-index: 999;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .toast.show {
                opacity: 1;
                transform: translateY(0);
            }
            .toast-dot {
                width: 8px;
                height: 8px;
                background: var(--accent);
                border-radius: 50%;
                flex-shrink: 0;
            }

            /* CART MODAL */
            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(28, 28, 28, 0.45);
                z-index: 200;
                display: none;
                align-items: flex-end;
                justify-content: flex-end;
            }
            .overlay.open {
                display: flex;
            }
            .cart-panel {
                background: var(--warm-white);
                width: 380px;
                height: 100vh;
                padding: 2rem 1.5rem;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 1.25rem;
                animation: slideIn 0.3s ease;
            }
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                }
                to {
                    transform: translateX(0);
                }
            }
            .cart-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .cart-title {
                font-family: "Playfair Display", serif;
                font-size: 1.3rem;
                color: var(--brown);
            }
            .close-btn {
                background: none;
                border: 1px solid var(--border);
                border-radius: 50%;
                width: 32px;
                height: 32px;
                cursor: pointer;
                font-size: 1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--muted);
            }
            .close-btn:hover {
                background: var(--cream);
            }

            .cart-empty {
                text-align: center;
                color: var(--muted);
                font-size: 0.9rem;
                padding: 3rem 0;
            }
            .cart-items {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }
            .cart-item {
                display: flex;
                gap: 1rem;
                align-items: center;
                padding-bottom: 1rem;
                border-bottom: 1px solid var(--border);
            }
            .cart-item-emoji {
                font-size: 2rem;
                width: 52px;
                height: 52px;
                background: var(--cream);
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .cart-item-info {
                flex: 1;
            }
            .cart-item-name {
                font-weight: 500;
                font-size: 0.88rem;
                margin-bottom: 4px;
            }
            .cart-item-price {
                font-size: 0.85rem;
                color: var(--accent);
            }
            .cart-item-qty {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-top: 6px;
            }
            .qty-btn {
                background: var(--cream);
                border: 1px solid var(--border);
                border-radius: 6px;
                width: 24px;
                height: 24px;
                cursor: pointer;
                font-size: 0.9rem;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .qty-btn:hover {
                background: var(--border);
            }
            .qty-num {
                font-size: 0.85rem;
                font-weight: 500;
                min-width: 20px;
                text-align: center;
            }
            .remove-item {
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                font-size: 0.75rem;
                margin-left: auto;
            }
            .remove-item:hover {
                color: #c0392b;
            }

            .cart-summary {
                border-top: 2px solid var(--border);
                padding-top: 1rem;
            }
            .cart-row {
                display: flex;
                justify-content: space-between;
                font-size: 0.88rem;
                margin-bottom: 8px;
                color: var(--muted);
            }
            .cart-total {
                font-size: 1rem;
                font-weight: 500;
                color: var(--charcoal);
            }
            .checkout-btn {
                width: 100%;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 12px;
                padding: 0.85rem;
                font-size: 0.92rem;
                font-weight: 500;
                cursor: pointer;
                font-family: inherit;
                margin-top: 1rem;
                transition: background 0.2s;
            }
            .checkout-btn:hover {
                background: var(--accent-dark);
            }

            /* FOOTER */
            footer {
                background: var(--brown);
                color: rgba(255, 255, 255, 0.6);
                text-align: center;
                padding: 2rem;
                font-size: 0.8rem;
                margin-top: 3rem;
            }
            footer strong {
                color: #fff;
            }

            /* RESPONSIVE */
            @media (max-width: 600px) {
                .nav-links {
                    display: none;
                }
                .search-bar input {
                    width: 110px;
                }
                .cart-panel {
                    width: 100vw;
                }
                .hero h1 {
                    font-size: 1.8rem;
                }
            }
        </style>
    </head>
    <body>
        <!-- NAVBAR -->
        <nav>
            <div class="nav-logo">Bening<span>Komputer</span></div>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
            </ul>
            <div class="nav-actions">
                <button class="login-btn" onclick="openLogin()">
                    👤 Login
                </button>

                <button class="cart-btn" onclick="openCart()">
                    🛒 Keranjang
                    <span class="cart-count" id="cart-count">0</span>
                </button>
            </div>
        </nav>

        <!-- HERO -->
        <section class="hero">
            <div class="hero-tag">✨ Koleksi Terbaru 2026</div>
            <h1>Produk Pilihan<br />Terbaik Untuk Anda</h1>
            <p>Temukan produk berkualitas dengan harga terjangkau.</p>
            <button
                class="hero-cta"
                onclick="
                    document
                        .querySelector('.section')
                        .scrollIntoView({ behavior: 'smooth' })
                "
            >
                Belanja Sekarang
            </button>
        </section>

        <!-- FILTER BAR -->
        <div class="filter-bar">
            <span class="filter-label">Kategori:</span>
            <button
                class="filter-btn active"
                onclick="filterProducts('semua', this)"
            >
                Semua
            </button>
            <button class="filter-btn" onclick="filterProducts('laptop', this)">
                laptop
            </button>
            <button
                class="filter-btn"
                onclick="filterProducts('aksesoris', this)"
            >
                aksesoris
            </button>
            <button
                class="filter-btn"
                onclick="filterProducts('komponen komputer', this)"
            >
                Komponen
            </button>
            <button
                class="filter-btn"
                onclick="filterProducts('printer', this)"
            >
                Printer
            </button>

            <div class="search-bar">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                    />
                </svg>
                <input
                    type="text"
                    id="search-input"
                    placeholder="Cari produk..."
                    oninput="searchProducts(this.value)"
                />
            </div>
        </div>

        <!-- PRODUCTS -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Produk Pilihan</h2>
                <span class="section-count" id="product-count"></span>
            </div>
            <div class="products-grid" id="products-grid"></div>
        </div>

        <!-- CART OVERLAY -->
        <div
            class="overlay"
            id="cart-overlay"
            onclick="handleOverlayClick(event)"
        >
            <div class="cart-panel">
                <div class="cart-header">
                    <span class="cart-title">Keranjang Belanja</span>
                    <button class="close-btn" onclick="closeCart()">✕</button>
                </div>
                <div id="cart-content"></div>
            </div>
        </div>

        <!-- LOGIN MODAL -->
        <div
            class="overlay"
            id="login-overlay"
            onclick="closeLoginOverlay(event)"
        >
            <div
                class="cart-panel"
                style="
                    max-width: 420px;
                    height: auto;
                    border-radius: 20px;
                    margin: auto;
                "
            >
                <div class="cart-header">
                    <span class="cart-title">Login Akun</span>
                    <button class="close-btn" onclick="closeLogin()">✕</button>
                </div>

                <div style="padding-top: 1rem">
                    <div style="margin-bottom: 1rem">
                        <label style="font-size: 0.85rem; color: var(--muted)">
                            Email
                        </label>

                        <input
                            type="email"
                            id="login-email"
                            placeholder="Masukkan email"
                            style="
                                width: 100%;
                                padding: 0.85rem 1rem;
                                border: 1px solid var(--border);
                                border-radius: 12px;
                                margin-top: 6px;
                                font-family: inherit;
                                outline: none;
                            "
                        />
                    </div>

                    <div style="margin-bottom: 1.5rem">
                        <label style="font-size: 0.85rem; color: var(--muted)">
                            Password
                        </label>

                        <input
                            type="password"
                            id="login-password"
                            placeholder="Masukkan password"
                            style="
                                width: 100%;
                                padding: 0.85rem 1rem;
                                border: 1px solid var(--border);
                                border-radius: 12px;
                                margin-top: 6px;
                                font-family: inherit;
                                outline: none;
                            "
                        />
                    </div>

                    <button class="checkout-btn" onclick="loginUser()">
                        Login
                    </button>
                </div>
            </div>
        </div>

        <!-- PAYMENT MODAL -->
        <div
            class="overlay"
            id="payment-overlay"
            onclick="closePaymentOverlay(event)"
        >
            <div
                class="cart-panel"
                style="
                    max-width: 520px;
                    height: auto;
                    border-radius: 20px;
                    margin: auto;
                "
            >
                <div class="cart-header">
                    <span class="cart-title">Pembayaran</span>
                    <button class="close-btn" onclick="closePayment()">
                        ✕
                    </button>
                </div>

                <div id="payment-content"></div>
            </div>
        </div>

        <!-- PAYMENT PROOF MODAL -->
        <div
            class="overlay"
            id="proof-overlay"
            onclick="closeProofOverlay(event)"
        >
            <div
                class="cart-panel"
                style="
                    max-width: 520px;
                    height: auto;
                    border-radius: 20px;
                    margin: auto;
                "
            >
                <div class="cart-header">
                    <span class="cart-title">Bukti Pembayaran</span>
                    <button class="close-btn" onclick="closeProof()">✕</button>
                </div>

                <div id="proof-content"></div>
            </div>
        </div>

        <!-- INVOICE MODAL -->
        <div
            class="overlay"
            id="invoice-overlay"
            onclick="closeInvoiceOverlay(event)"
        >
            <div
                class="cart-panel"
                style="
                    max-width: 620px;
                    height: auto;
                    border-radius: 20px;
                    margin: auto;
                "
            >
                <div class="cart-header">
                    <span class="cart-title">Invoice Pembayaran</span>
                    <button class="close-btn" onclick="closeInvoice()">
                        ✕
                    </button>
                </div>

                <div id="invoice-content"></div>
            </div>
        </div>

        <!-- TOAST -->
        <div
            class="overlay"
            id="product-modal"
            onclick="closeProductModal(event)"
        >
            <div
                class="cart-panel"
                style="
                    max-width: 500px;
                    height: auto;
                    border-radius: 20px;
                    margin: auto;
                "
            >
                <div class="cart-header">
                    <span class="cart-title">Detail Produk</span>
                    <button class="close-btn" onclick="hideProductModal()">
                        ✕
                    </button>
                </div>

                <div id="product-detail-content"></div>
            </div>
        </div>

        <div class="toast" id="toast">
            <span class="toast-dot"></span>
            <span id="toast-msg">Produk ditambahkan!</span>
        </div>

        <!-- FOOTER -->
        <footer>
            <p><strong>BeningKomputer</strong> © 2026</p>
        </footer>

        <script>
            const PRODUCTS = [
                {
                    id: 1,
                    name: "Laptop Gaming",
                    cat: "laptop",
                    emoji: "📱",
                    price: 4599000,
                    oldPrice: 5299000,
                    rating: 4.8,
                    reviews: 312,
                    badge: "sale",
                    desc: "Laptop gaming performa tinggi dengan processor terbaru dan VGA dedicated.",
                },
                {
                    id: 2,
                    name: "Earbuds Wireless TWS",
                    cat: "laptop",
                    emoji: "🎧",
                    price: 299000,
                    oldPrice: null,
                    rating: 4.5,
                    reviews: 188,
                    badge: "new",
                },
                {
                    id: 3,
                    name: 'Laptop Ultrabook 14"',
                    cat: "laptop",
                    emoji: "💻",
                    price: 9200000,
                    oldPrice: 10500000,
                    rating: 4.7,
                    reviews: 95,
                    badge: "sale",
                },
                {
